networks:
  demo-net:

volumes:
  kafka_data:
  spark_output:
  postgres_data:
  minio_data:

services:
  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:15
    container_name: postgres
    networks: [demo-net]
    ports:
      - "5432:5432"
    command: >
      postgres
        -c wal_level=logical
        -c max_replication_slots=5
        -c max_wal_senders=5
    environment:
      POSTGRES_DB: hospital
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hospital"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------- Ingestion (loads CSVs into PostgreSQL) ----------
  ingestion:
    build: ./app
    container_name: ingestion
    networks: [demo-net]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/data
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGDB=hospital
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - CSV_DIR=/data

  # ---------- Debezium (Kafka Connect + PostgreSQL connector) ----------
  debezium:
    image: debezium/connect:2.6
    container_name: debezium
    networks: [demo-net]
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: on-failure
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium-hospital
      CONFIG_STORAGE_TOPIC: debezium_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------- Debezium Init (registers the connector once) ----------
  debezium-init:
    image: curlimages/curl:8.7.1
    container_name: debezium-init
    networks: [demo-net]
    depends_on:
      debezium:
        condition: service_healthy
      ingestion:
        condition: service_completed_successfully
    volumes:
      - ./debezium:/debezium
    command: >
      sh -c "curl -sf -X POST http://debezium:8083/connectors
      -H 'Content-Type: application/json'
      -d @/debezium/hospital-connector.json"

  # ---------- Kafka (KRaft combined mode, no ZooKeeper) ----------
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka
    networks: [demo-net]
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: "1"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: on-failure
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---------- Schema Registry ----------
  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.0
    container_name: schema-registry
    networks: [demo-net]
    ports:
      - "8085:8081"
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

  # ---------- Kafka UI ----------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks: [demo-net]
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  # ---------- MinIO (S3-compatible object store) ----------
  minio:
    image: minio/minio:latest
    container_name: minio
    networks: [demo-net]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- MinIO Init (creates hospital bucket) ----------
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    networks: [demo-net]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/hospital &&
      echo 'Bucket ready: hospital'
      "

  # ---------- Spark Master ----------
  spark-master:
    image: spark:3.5.1-python3
    container_name: spark-master
    networks: [demo-net]
    hostname: spark-master
    ports:
      - "7077:7077"
      - "8081:8080"
    command: >
      bash -lc "/opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark-master --port 7077 --webui-port 8080"
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------- Spark Worker ----------
  spark-worker:
    image: spark:3.5.1-python3
    container_name: spark-worker
    networks: [demo-net]
    hostname: spark-worker
    ports:
      - "8082:8081"
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
    command: >
      bash -lc "/opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077 --webui-port 8081"
    depends_on:
      spark-master:
        condition: service_healthy
    restart: on-failure

  # ---------- Spark App (runs spark-submit once) ----------
  spark-app:
    image: spark:3.5.1-python3
    container_name: spark-app
    user: root
    networks: [demo-net]
    depends_on:
      spark-master:
        condition: service_healthy
      spark-worker:
        condition: service_started
      debezium-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./spark/app:/opt/spark-app
      - spark_output:/opt/spark/output
    restart: on-failure
    command: >
      bash -lc "
      /opt/spark/bin/spark-submit --master spark://spark-master:7077
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1,org.apache.kafka:kafka-clients:3.7.0,io.delta:delta-spark_2.12:3.2.0,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262
      /opt/spark-app/stream_job.py
      "
